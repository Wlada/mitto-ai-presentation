<div class="shell">
  <header class="topbar">
    <a class="brand" routerLink="/slides/1" aria-label="Mitto — back to first slide">
      <img src="mitto-logo.svg" alt="Mitto" width="84" height="27" />
    </a>
    <h2 class="slide-title">{{ slides.currentSlide().title }}</h2>
    <span class="counter">{{ slides.currentNumber() }} / {{ slides.total() }}</span>
  </header>

  <main class="body">
    <div class="body-inner">
      <router-outlet />
    </div>

    <a
      class="corner-qr"
      href="https://github.com/Wlada/mitto-ai-presentation"
      target="_blank"
      rel="noopener"
      aria-label="Browse the source code on GitHub"
    >
      <span class="corner-qr-frame">
        <img src="qr-github.svg" alt="QR code linking to the source repo" />
      </span>
      <span class="corner-qr-label">Browse the code</span>
    </a>
  </main>

  <footer class="bottombar">
    <button
      mat-icon-button
      type="button"
      aria-label="Previous slide"
      [disabled]="!slides.canGoPrev()"
      (click)="onPrev()"
    >
      <mat-icon>arrow_back</mat-icon>
    </button>

    <div class="dots">
      @for (slide of slides.slides; track slide.number) {
        <button
          type="button"
          class="dot"
          [class.active]="slide.number === slides.currentNumber()"
          [attr.aria-label]="'Go to slide ' + slide.number"
          (click)="goTo(slide.number)"
        ></button>
      }
    </div>

    <button
      mat-icon-button
      type="button"
      aria-label="Next slide"
      [disabled]="!slides.canGoNext()"
      (click)="onNext()"
    >
      <mat-icon>arrow_forward</mat-icon>
    </button>
  </footer>
</div>
