# Render Blueprint — see https://render.com/docs/blueprint-spec
#
# Deploys the Express backend AND the built Angular static files as a single
# free-tier web service. Branch demo-finished is the shipped branch (it
# carries the Audience Q&A feature). Push to that branch triggers a redeploy.
#
# After the first deploy:
#   1. Add presentation.vladimirbujanovic.com under Settings → Custom Domains
#   2. At Cloudflare, add CNAME presentation → mitto-ai-presentation.onrender.com
#      with proxy OFF until Render shows "Verified", then optionally proxy ON
#   3. Verify CORS_ORIGIN below matches the final hostname

services:
  - type: web
    name: mitto-ai-presentation
    runtime: node
    region: frankfurt
    plan: free
    branch: demo-finished
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STATIC_DIR
        value: /opt/render/project/src/apps/web/dist/web/browser
      - key: CORS_ORIGIN
        value: https://presentation.vladimirbujanovic.com
